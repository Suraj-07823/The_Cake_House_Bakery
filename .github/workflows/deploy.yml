name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Dependencies
        run: npm install
      
      - name: Run Tests
        run: npm test
      
      - name: Check File Integrity
        run: |
          echo "✓ HTML files present"
          test -f index.html && echo "  - index.html" || exit 1
          test -f pages/cakes.html && echo "  - pages/cakes.html" || exit 1
          test -f pages/cupcakes.html && echo "  - pages/cupcakes.html" || exit 1
          test -f pages/custom.html && echo "  - pages/custom.html" || exit 1
          
          echo "✓ CSS files present"
          test -f css/style.css && echo "  - css/style.css" || exit 1
          
          echo "✓ JavaScript files present"
          test -f js/products.js && echo "  - js/products.js" || exit 1
          test -f js/script.js && echo "  - js/script.js" || exit 1
          test -f js/customCake.js && echo "  - js/customCake.js" || exit 1

  deploy:
   name: Deploy to Vercel
   runs-on: ubuntu-latest
   needs: lint-and-test
   if: github.ref == 'refs/heads/main' && github.event_name == 'push'

   steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Vercel CLI
      run: npm install --global vercel@latest

    - name: Deploy to Vercel
      run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    - name: Deployment Notification
      if: success()
      run: |
        echo "✅ Deployment Successful!"
        echo "🌐 Your site is live"

    - name: Deployment Failed
      if: failure()
      run: |
        echo "❌ Deployment Failed!"
        exit 1