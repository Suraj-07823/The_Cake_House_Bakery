name: Performance Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  performance:
    name: Lint & Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Next.js Application
        run: npm run build

      - name: Report
        if: always()
        run: |
          echo "📊 Validation Report"
          echo "===================="
          echo "✅ Dependency installation completed"
          echo "✅ ESLint validation completed"
          echo "✅ Next.js build completed"
          echo "🚀 Application is deployment ready"
